version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
      exclude:
        - "@jsse/*"
    ignore:
      - dependency-name: "@types/node"
        versions: [">=25"]
